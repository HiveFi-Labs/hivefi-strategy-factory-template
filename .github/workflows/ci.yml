name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: hivefi-factory smoke
        run: |
          hivefi-factory --version
          hivefi-factory --help

      - name: AST validator smoke (all bundled strategies)
        run: hivefi-factory validate --all

      - name: pytest
        run: pytest tests/ -v
